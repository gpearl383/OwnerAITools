name: Agent health monitor

on:
  schedule:
    # Every 5 minutes (UTC). GitHub may delay slightly under load.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Run OwnerAI monitor probes
        env:
          MONITOR_URL: ${{ vars.MONITOR_URL || 'https://owneraitools.com/api/monitor' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not set — failing"
            exit 1
          fi
          code=$(curl -sS -o /tmp/monitor.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Accept: application/json" \
            "$MONITOR_URL")
          echo "HTTP $code"
          cat /tmp/monitor.json
          echo
          test "$code" = "200"
